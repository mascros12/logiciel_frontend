<aside class="sidebar" [class.collapsed]="collapsed()">
    <div class="sidebar-logo">
      @if (!collapsed()) {
        <div class="sidebar-brand">
          <img
            class="sidebar-brand__mark sidebar-brand__mark--logo"
            src="/logo.png"
            alt=""
            decoding="async"
          />
          <span class="logo-text">Logiciel CRV</span>
        </div>
      } @else {
        <img
          class="sidebar-brand__mark sidebar-brand__mark--collapsed sidebar-brand__mark--logo"
          src="/logo.png"
          alt="Logiciel CRV"
          decoding="async"
        />
      }
    </div>
  
    <nav class="sidebar-nav">
      @for (item of navItems; track item.route) {
        @if (canShowItem(item)) {
          <a
            [routerLink]="item.route"
            routerLinkActive="active"
            class="nav-item"
            [class.collapsed]="collapsed()"
            [title]="collapsed() ? item.label : ''"
          >
            <i [class]="item.icon"></i>
            @if (!collapsed()) {
              <span>{{ item.label }}</span>
            }
          </a>
        }
      }
    </nav>
  
    <div class="sidebar-footer">
      <button class="nav-item logout-btn" (click)="auth.logout()">
        <i class="pi pi-sign-out"></i>
        @if (!collapsed()) {
          <span>Cerrar sesión</span>
        }
      </button>
    </div>
  </aside>
