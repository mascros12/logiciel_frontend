<p-toast />
<p-confirmDialog />

<div class="page-container">
  <div class="flex justify-between items-center mb-4">
    <h2 class="page-title">Usuarios</h2>
    <div class="flex items-center gap-3">
      <span class="p-input-icon-left quotation-search">
        <i class="pi pi-search"></i>
        <input
          pInputText
          type="text"
          placeholder="Buscar por nombre o usuario..."
          [(ngModel)]="searchTerm"
        />
      </span>
      <p-button
        label="Desactivar seleccionados"
        icon="pi pi-user-minus"
        severity="danger"
        [outlined]="true"
        [disabled]="!selectedUsers.length"
        [loading]="bulkDeactivating()"
        (onClick)="confirmBulkDeactivate($event)"
      />
      <p-button label="Nuevo usuario" icon="pi pi-plus" (onClick)="openCreate()" />
    </div>
  </div>

  <p-table
    [value]="filteredUsers()"
    [loading]="loading()"
    styleClass="p-datatable-gridlines"
    [paginator]="true"
    [rows]="rowsPerPage"
    [rowsPerPageOptions]="rowsPerPageOptions"
    dataKey="id"
    [(selection)]="selectedUsers"
    selectionMode="multiple"
  >
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 3rem">
          <p-tableHeaderCheckbox />
        </th>
        <th>Nombre</th>
        <th>Usuario</th>
        <th>Rol</th>
        <th>Estado</th>
        <th>Creado</th>
        <th style="width: 8rem">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-u>
      <tr>
        <td (click)="$event.stopPropagation()">
          <p-tableCheckbox [value]="u" [disabled]="!u.is_active" />
        </td>
        <td>{{ u.full_name }}</td>
        <td>{{ u.email }}</td>
        <td>
          <p-tag [value]="roleLabel(u.role)" severity="info" />
        </td>
        <td>
          @if (u.is_active) {
            <p-tag value="Activo" severity="success" />
          } @else {
            <p-tag value="Inactivo" severity="secondary" />
          }
        </td>
        <td>{{ u.created_at | date: 'dd/MM/yyyy' }}</td>
        <td>
          <div class="flex gap-2">
            <p-button icon="pi pi-pencil" [text]="true" size="small" (onClick)="openEdit(u)" />
            <p-button
              icon="pi pi-key"
              [text]="true"
              size="small"
              pTooltip="Cambiar contraseña"
              (onClick)="openChangePassword(u)"
            />
            @if (u.is_active) {
              <p-button
                icon="pi pi-user-minus"
                [text]="true"
                size="small"
                severity="danger"
                (onClick)="confirmDeactivate($event, u)"
              />
            }
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr><td colspan="7" class="text-center">No hay usuarios</td></tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [header]="editing() ? 'Editar usuario' : 'Nuevo usuario'"
  [visible]="showDialog()"
  (visibleChange)="showDialog.set($event)"
  [modal]="true"
  [style]="{ width: 'min(520px, 96vw)' }"
>
  <form [formGroup]="form" class="user-form">
    <div class="field">
      <label>Nombre completo *</label>
      <input pInputText formControlName="full_name" class="w-full" />
    </div>

    <div class="field">
      <label>Username *</label>
      <input pInputText type="text" formControlName="email" class="w-full" placeholder="usuario" />
    </div>

    <div class="field">
      <label>Rol *</label>
      <p-select
        formControlName="role"
        [options]="roleOptions"
        optionLabel="label"
        optionValue="value"
        appendTo="body"
        styleClass="w-full"
      />
    </div>

    @if (!editing()) {
      <div class="field">
        <label>Contraseña *</label>
        <p-password
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
          placeholder="Mínimo 8 caracteres"
        />
      </div>
    }
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" [text]="true" (onClick)="showDialog.set(false)" />
    <p-button
      [label]="editing() ? 'Guardar cambios' : 'Crear usuario'"
      icon="pi pi-check"
      [loading]="saving()"
      (onClick)="submit()"
    />
  </ng-template>
</p-dialog>

<p-dialog
  header="Cambiar contraseña"
  [visible]="showPasswordDialog()"
  (visibleChange)="showPasswordDialog.set($event)"
  [modal]="true"
  [style]="{ width: 'min(440px, 96vw)' }"
>
  <form [formGroup]="passwordForm" class="user-form">
    <div class="field">
      <label>Usuario</label>
      <input pInputText type="text" [value]="passwordTarget()?.email ?? ''" class="w-full" readonly />
    </div>

    <div class="field">
      <label>Nueva contraseña *</label>
      <p-password
        formControlName="new_password"
        [feedback]="false"
        [toggleMask]="true"
        styleClass="w-full"
        inputStyleClass="w-full"
        placeholder="Mínimo 8 caracteres"
      />
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" [text]="true" (onClick)="showPasswordDialog.set(false)" />
    <p-button
      label="Guardar contraseña"
      icon="pi pi-check"
      [loading]="saving()"
      (onClick)="confirmSubmitPassword()"
    />
  </ng-template>
</p-dialog>
